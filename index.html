<!DOCTYPE html>
<html>
<head>
</head>
<body>
  
<button onclick="sendMessage()" ontouchstart="sendMessage()">send message</button>

<script>
function sendMessage() {
  const message = 'Hello from my computer!!!';

  const options = {
    hostname: '192.168.1.242',
    port: 3000,
    path: '/',
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain',
      'Content-Length': message.length
    }
  };

  const req = new XMLHttpRequest();
  req.open(options.method, `http://${options.hostname}:${options.port}${options.path}`);
  req.setRequestHeader('Content-Type', options.headers['Content-Type']);
  req.setRequestHeader('Content-Length', options.headers['Content-Length']);
  
  req.onload = function() {
    // Process the response
    console.log('Response:', req.responseText);
  };

  req.onerror = function(error) {
    console.error('Error:', error);
  };

  req.send(message);
}
</script>
</body>
</html>
