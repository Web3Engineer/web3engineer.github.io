<!DOCTYPE html>
<html>
<head>
</head>
<body>

<button onclick="sendMessage()">Send message</button>

<script>
function sendMessage() {
  const message = 'Hello from my computer!!!!!!';

  const options = {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain',
    },
    body: message,
  };

  fetch('http://192.168.1.242:3000/', options)
    .then(response => {
      if (!response.ok) {
        throw new Error('HTTP error ' + response.status);
      }
      return response.text();
    })
    .then(data => {
      console.log('Response:', data);
    })
    .catch(error => {
      console.error('Error:', error);
    });
}

</script>
</body>
</html>
